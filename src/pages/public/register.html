<!doctype html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../../assets/calendar-clock-svgrepo-com.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>minsu-class-scheduler-system</title>
    <link type="text/css" rel="stylesheet" href="../../style.css"/>
</head>
<body class="bg-white flex flex-col items-center h-screen"> 
    <header id="header" class="w-screen"></header>
    
    <main class="flex items-center justify-center w-screen grow">
    
        <form id="registerForm" class="border-2 bg-gray-200 flex flex-col gap-1.5 p-4 rounded-xl">
            <div class="">
                <i class="bi bi-envelope"></i>
                <label class="">Email</label>
            </div>
            <div class="flex flex-col">
                <input id="email_input" type="text" class="bg-white p-1 rounded-md grow"/>
                <label id="email_input_error" class="text-red-500">
                    <!-- err msg -->
                </label>
            </div>
            <div>
                <i class="bi bi-key"></i>
                <label class="">Password</label>
            </div>
            <div class="flex flex-col">
                <div class="flex">
                    <input id="password_input" type="password" class="bg-white p-1 rounded-l-md"/>
                    <button type="button" id="viewPasswordInputBtn" class="p-1 rounded-r-md bg-white">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
                <label id="password_input_error" class="text-red-500">
                    <!-- err msg -->
                </label>
            </div>
    
    
            <div>
                <i class="bi bi-key"></i>
                <label class="">Confirm password</label>
            </div>
            <div class="flex flex-col">
                <div class="flex">
                    <input id="confirm_password_input" type="password" class="bg-white p-1 rounded-l-md"/>
                    <button type="button" id="viewConfirmPasswordInputBtn" class="p-1 rounded-r-md bg-white">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
                <label id="confirm_password_input_error" class="text-red-500">
                    <!-- err msg -->
                </label>
            </div>
    
            <button type="submit" class="bg-[var(--color-primary)] hover:scale-110  hover:rounded-2xl duration-150 cursor-pointer rounded-md font-bold pt-2 pb-2 mt-6">
                Register
            </button>
            <a href="./login.html" class="text-sm flex justify-center underline hover:scale-110 duration-150 cursor-pointer">
                Already have an account?
            </a>
        </form>
    </main>

</body>
</html>


<script lang="js" type="module">
import { z } from "zod"; // https://zod.dev/basics
// import { login } from '../../js/api/auth.js'
import { routes, addLink } from '../../js/routes.js'
import { topBarNav } from '../../js/components/topBarNav.js'
import { navButton } from '../../js/components/navButton.js'

const registerForm = document.getElementById('registerForm')
const email_input = document.getElementById('email_input')
const email_input_error = document.getElementById('email_input_error')

const password_input = document.getElementById('password_input')
const viewPasswordInputBtn = document.getElementById('viewPasswordInputBtn')
const password_input_error = document.getElementById('password_input_error')

const confirm_password_input = document.getElementById('confirm_password_input')
const confirm_password_input_error = document.getElementById('confirm_password_input_error')
const viewConfirmPasswordInputBtn = document.getElementById('viewConfirmPasswordInputBtn')


let isPasswordInputVisible = false;
let isConfirmPasswordInputVisible = false;


const togglePasswordVisibility = () => {
    if (isPasswordInputVisible) {
        viewPasswordInputBtn.innerHTML = `<i class="bi bi-eye"></i>`
        password_input.setAttribute("type", "password")
    }
    else {
        viewPasswordInputBtn.innerHTML = `<i class="bi bi-eye-slash"></i>`
        password_input.setAttribute("type", "text")
    } 
    isPasswordInputVisible = !isPasswordInputVisible
}

const toggleConfirmPasswordVisibility = () => {
    if (isConfirmPasswordInputVisible) {
        viewConfirmPasswordInputBtn.innerHTML = `<i class="bi bi-eye"></i>`
        confirm_password_input.setAttribute("type", "password")
    }
    else {
        viewConfirmPasswordInputBtn.innerHTML = `<i class="bi bi-eye-slash"></i>`
        confirm_password_input.setAttribute("type", "text")
    }
    isConfirmPasswordInputVisible = !isConfirmPasswordInputVisible
}


const userSchema = z.object({
    email: z.string().email(),
    password: z.string().min(8, 'minimum of 8 characters').max(64, 'maximum of 64 characters'),
    confirm_password: z.string().min(8, 'minimum of 8 characters').max(64, 'maximum of 64 characters'),
});


const submitForm = (event) => {
    event.preventDefault();
    const result = userSchema.safeParse({
        email: email_input.value,
        password: password_input.value,
        confirm_password: confirm_password_input.value,
    });
    
    if (!result.success) {
        email_input_error.innerText = result.error.format().email._errors // error: undefined
        password_input_error.innerText = result.error.format().password._errors
        confirm_password_input_error.innerText = result.error.format().confirm_password._errors

        console.log(result.error.format());
    } 
    else {
        console.log(result.data);
        // send data to API
        login(result.data);
    }
}

const header = document.getElementById('header');
const links = 
    navButton('bi bi-house', 'home', routes.public.home) +
    navButton('bi bi-box-arrow-in-left', 'login', routes.public.login) + 
    navButton('bi bi-vector-pen', 'register', routes.public.register)
header.innerHTML = topBarNav(links);

viewPasswordInputBtn.addEventListener('click', togglePasswordVisibility)
viewConfirmPasswordInputBtn.addEventListener('click', toggleConfirmPasswordVisibility)
registerForm.addEventListener('submit', submitForm)



</script>

<style>
@import "../../style.css";


</style>
